name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  packages: write
  contents: read

jobs:
  build-test-publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@ipjohnson-org"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run

      - name: Build bundles
        run: node esbuild.config.mjs

      - name: Verify bundles exist
        run: |
          test -f dist/framework.bundle.js && echo "OK: framework.bundle.js" || exit 1
          test -f dist/framework.esm.js && echo "OK: framework.esm.js" || exit 1
          test -f libs/zod.min.js && echo "OK: zod.min.js" || exit 1
          test -f libs/manifest.json && echo "OK: manifest.json" || exit 1

      - name: Set dev version and publish
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          npm version 0.1.0-dev.$(date +%Y%m%d%H%M%S) --no-git-tag-version
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
